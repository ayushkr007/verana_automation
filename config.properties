# =============================================================
# Verana Automation - Configuration
# =============================================================

# Verana app URLs
dashboard.url=https://app.testnet.verana.network/dashboard
did.page.url=https://app.testnet.verana.network/did

# -------------------------------------------------------------
# Chrome profile to use for Selenium
#
# IMPORTANT:
# 1) Keep this as a dedicated Selenium profile path.
# 2) Install Keplr in this profile once using ./launch_chrome.sh
# 3) For no-password repeated runs, enable attach mode below and keep
#    the same Chrome session open with ./start_keplr_session.sh.
# -------------------------------------------------------------
chrome.user.data.dir=/Users/ayushkumar2109/selenium-keplr-profile
chrome.profile.directory=Default
chrome.attach.to.running=false
chrome.debugger.address=127.0.0.1:9222
chrome.debug.start.wait.seconds=1

# Path to unpacked Keplr extension directory (contains manifest.json)
# Auto-detected from user-data-dir if left empty.
keplr.extension.path=/Users/ayushkumar2109/selenium-keplr-profile/Default/Extensions/dmkamcknogkgcdfhhbddcghachkejeap/0.13.11_0

# Optional Chrome binary path (leave empty if Chrome is in PATH)
chrome.binary.path=/Applications/Google Chrome.app/Contents/MacOS/Google Chrome

# Browser behavior
browser.headless=false
close.browser.on.finish=false
page.load.strategy=eager

# Timeouts (seconds)
implicit.wait.seconds=2
explicit.wait.seconds=6
page.load.timeout.seconds=30
did.add.button.wait.seconds=6
keplr.unlock.precheck.seconds=2
keplr.unlock.preopen.enabled=true
keplr.unlock.preopen.seconds=4
keplr.extension.id=dmkamcknogkgcdfhhbddcghachkejeap
keplr.unlock.wait.seconds=60
keplr.connection.popup.wait.seconds=20
keplr.transaction.quick.popup.wait.seconds=2
keplr.transaction.popup.wait.seconds=20
keplr.optional.popup.wait.seconds=1
keplr.native.approve.fallback=true
keplr.native.unlock.fallback=true
keplr.auto.unlock.enabled=true
keplr.password.env.var=KEPLR_PASSWORD
keplr.password.keychain.service=verana_keplr_password
# Optional fallback (not recommended): plain password in config
# keplr.password removed for security
tx.success.wait.seconds=60
tx.success.toast.wait.seconds=30

# -------------------------------------------------------------
# Keplr extension icon & Approve button positions (Robot clicks)
#
# These are pixel offsets from the browser window edges.
# After "Add DID" form submit, Robot clicks the Keplr icon in the
# toolbar, waits for the popup, then clicks the Approve button.
#
# To find the right values:
# 1. Maximize Chrome, note the window size from test output
# 2. Keplr icon: measure from the RIGHT edge and TOP of window
# 3. Approve button: measure from RIGHT edge and TOP of window
#    (it's at the bottom of the Keplr popup dropdown)
# -------------------------------------------------------------
keplr.icon.x.from.right=190
keplr.icon.y.from.top=60
keplr.approve.x.from.right=80
keplr.approve.y.from.top=570
keplr.popup.render.wait.ms=2000

# DID generation settings
did.prefix=did:vna:testnet
did.registration.period.years=1
